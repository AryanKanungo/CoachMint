name: coachmint
description: "CoachMint - AI Financial Coach"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # GetX
  get: ^4.6.6
  # Navigation
  go_router: ^13.2.0

  # Supabase (replaces Firebase)
  supabase_flutter: ^2.5.0

  # SMS reading (replaces telephony)
  flutter_sms_inbox: ^1.0.3
  permission_handler: ^11.3.0

  # Local notifications
  flutter_local_notifications: ^17.2.0

  # Offline cache
  sqflite: ^2.3.2
  path: ^1.9.0

  # Charts
  fl_chart: ^0.68.0

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.5.3
  crypto: ^3.0.3
  uuid: ^4.4.0
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/app_logo.png
    - assets/logo_icon.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/app_logo.png"