name: coachmint
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # GetX
  get: ^4.6.6

  # URL Launcher for Government Schemes
  url_launcher: ^6.3.0

  # Charts
  syncfusion_flutter_charts: ^32.2.8

  # Fonts
  google_fonts: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.8

  # SMS + permissions
  telephony:
    git:
      url: https://github.com/AryanKanungo/Telephony.git
      ref: develop
  permission_handler: ^12.0.1

  # ---- FIREBASE PACKAGES ----
  firebase_core: ^3.6.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1

  # Storage and Utilities
  shared_preferences: ^2.5.3
  uuid: ^4.5.2
  supabase_flutter: ^2.12.0
  go_router: ^17.1.0
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/app_logo.png
    - assets/logo_icon.png
    - .env

flutter_icons:
  android: true
  ios: true
  image_path: "assets/app_logo.png"